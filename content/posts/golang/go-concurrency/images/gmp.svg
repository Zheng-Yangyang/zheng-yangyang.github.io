<svg width="640" height="340" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="640" height="340" fill="#1e1e2e" rx="12"/>
  <text x="320" y="32" text-anchor="middle" fill="#cdd6f4" font-size="14" font-weight="bold">GMP 调度模型</text>

  <!-- Global Queue -->
  <rect x="220" y="50" width="200" height="44" rx="6" fill="#181825" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="320" y="68" text-anchor="middle" fill="#f9e2af" font-size="11" font-weight="bold">Global Queue (GRQ)</text>
  <text x="320" y="84" text-anchor="middle" fill="#6c7086" font-size="10">G G G G G ...</text>

  <!-- P1 -->
  <rect x="40" y="130" width="170" height="130" rx="8" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="125" y="152" text-anchor="middle" fill="#cba6f7" font-size="12" font-weight="bold">P1  (Processor)</text>
  <rect x="55" y="162" width="140" height="30" rx="4" fill="#181825" stroke="#cba6f7" stroke-width="1"/>
  <text x="125" y="181" text-anchor="middle" fill="#6c7086" font-size="10">Local Queue: G G G</text>
  <rect x="55" y="202" width="140" height="44" rx="4" fill="#45475a" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="125" y="220" text-anchor="middle" fill="#89b4fa" font-size="11" font-weight="bold">M1 (OS Thread)</text>
  <text x="125" y="238" text-anchor="middle" fill="#a6e3a1" font-size="11">running: G</text>

  <!-- P2 -->
  <rect x="235" y="130" width="170" height="130" rx="8" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="320" y="152" text-anchor="middle" fill="#cba6f7" font-size="12" font-weight="bold">P2  (Processor)</text>
  <rect x="250" y="162" width="140" height="30" rx="4" fill="#181825" stroke="#cba6f7" stroke-width="1"/>
  <text x="320" y="181" text-anchor="middle" fill="#6c7086" font-size="10">Local Queue: G G</text>
  <rect x="250" y="202" width="140" height="44" rx="4" fill="#45475a" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="320" y="220" text-anchor="middle" fill="#89b4fa" font-size="11" font-weight="bold">M2 (OS Thread)</text>
  <text x="320" y="238" text-anchor="middle" fill="#a6e3a1" font-size="11">running: G</text>

  <!-- P3 -->
  <rect x="430" y="130" width="170" height="130" rx="8" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="515" y="152" text-anchor="middle" fill="#cba6f7" font-size="12" font-weight="bold">P3  (Processor)</text>
  <rect x="445" y="162" width="140" height="30" rx="4" fill="#181825" stroke="#cba6f7" stroke-width="1"/>
  <text x="515" y="181" text-anchor="middle" fill="#6c7086" font-size="10">Local Queue: G</text>
  <rect x="445" y="202" width="140" height="44" rx="4" fill="#45475a" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="515" y="220" text-anchor="middle" fill="#89b4fa" font-size="11" font-weight="bold">M3 (OS Thread)</text>
  <text x="515" y="238" text-anchor="middle" fill="#a6e3a1" font-size="11">running: G</text>

  <!-- Arrows from GRQ to P -->
  <line x1="260" y1="94" x2="155" y2="130" stroke="#f9e2af" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#yarr)"/>
  <line x1="310" y1="94" x2="310" y2="130" stroke="#f9e2af" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#yarr)"/>
  <line x1="370" y1="94" x2="480" y2="130" stroke="#f9e2af" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#yarr)"/>

  <!-- Work stealing arrow -->
  <path d="M 210 225 Q 222 270 250 225" stroke="#f38ba8" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#rarr)"/>
  <text x="228" y="272" text-anchor="middle" fill="#f38ba8" font-size="9">work steal</text>

  <!-- CPU bar -->
  <rect x="40" y="290" width="560" height="28" rx="6" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="320" y="308" text-anchor="middle" fill="#6c7086" font-size="11">G = Goroutine   M = OS Thread   P = Processor (逻辑核，GOMAXPROCS 控制数量)</text>

  <defs>
    <marker id="yarr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f9e2af"/>
    </marker>
    <marker id="rarr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f38ba8"/>
    </marker>
  </defs>
</svg>
