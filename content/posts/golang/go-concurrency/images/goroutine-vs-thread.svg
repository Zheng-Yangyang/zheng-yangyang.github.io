<svg width="640" height="300" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="640" height="300" fill="#1e1e2e" rx="12"/>
  <text x="320" y="32" text-anchor="middle" fill="#cdd6f4" font-size="14" font-weight="bold">Goroutine vs OS Thread</text>

  <!-- Thread side -->
  <text x="160" y="60" text-anchor="middle" fill="#f38ba8" font-size="12" font-weight="bold">OS Thread</text>
  <rect x="60" y="72" width="200" height="50" rx="6" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="160" y="92" text-anchor="middle" fill="#cdd6f4" font-size="11">栈大小：固定 1~8 MB</text>
  <text x="160" y="110" text-anchor="middle" fill="#cdd6f4" font-size="11">由 OS 内核调度</text>

  <rect x="60" y="134" width="200" height="50" rx="6" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="160" y="154" text-anchor="middle" fill="#cdd6f4" font-size="11">上下文切换：~1µs</text>
  <text x="160" y="172" text-anchor="middle" fill="#cdd6f4" font-size="11">系统调用开销大</text>

  <rect x="60" y="196" width="200" height="50" rx="6" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="160" y="216" text-anchor="middle" fill="#cdd6f4" font-size="11">并发数：通常数百~千</text>
  <text x="160" y="234" text-anchor="middle" fill="#f38ba8" font-size="11">受 OS 资源限制</text>

  <!-- Divider -->
  <line x1="320" y1="55" x2="320" y2="270" stroke="#45475a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Goroutine side -->
  <text x="480" y="60" text-anchor="middle" fill="#a6e3a1" font-size="12" font-weight="bold">Goroutine</text>
  <rect x="380" y="72" width="200" height="50" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="480" y="92" text-anchor="middle" fill="#cdd6f4" font-size="11">栈大小：初始 2KB，可伸缩</text>
  <text x="480" y="110" text-anchor="middle" fill="#cdd6f4" font-size="11">由 Go runtime 调度</text>

  <rect x="380" y="134" width="200" height="50" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="480" y="154" text-anchor="middle" fill="#cdd6f4" font-size="11">上下文切换：~200ns</text>
  <text x="480" y="172" text-anchor="middle" fill="#cdd6f4" font-size="11">用户态切换，极轻量</text>

  <rect x="380" y="196" width="200" height="50" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="480" y="216" text-anchor="middle" fill="#cdd6f4" font-size="11">并发数：可达百万级</text>
  <text x="480" y="234" text-anchor="middle" fill="#a6e3a1" font-size="11">极低内存占用</text>
</svg>
