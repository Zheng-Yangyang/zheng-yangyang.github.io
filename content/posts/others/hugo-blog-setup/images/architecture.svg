<svg width="600" height="320" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="600" height="320" fill="#1e1e2e" rx="12"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" fill="#cdd6f4" font-size="15" font-weight="bold">Hugo Blog 部署流程</text>

  <!-- Box: Local -->
  <rect x="30" y="60" width="140" height="80" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="100" y="88" text-anchor="middle" fill="#89b4fa" font-size="12" font-weight="bold">本地</text>
  <text x="100" y="108" text-anchor="middle" fill="#cdd6f4" font-size="11">Typora 写作</text>
  <text x="100" y="126" text-anchor="middle" fill="#cdd6f4" font-size="11">git push</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="100" x2="220" y2="100" stroke="#a6e3a1" stroke-width="2" marker-end="url(#arr)"/>
  <text x="195" y="92" text-anchor="middle" fill="#a6e3a1" font-size="10">push</text>

  <!-- Box: GitHub -->
  <rect x="220" y="60" width="140" height="80" rx="8" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="290" y="88" text-anchor="middle" fill="#cba6f7" font-size="12" font-weight="bold">GitHub</text>
  <text x="290" y="108" text-anchor="middle" fill="#cdd6f4" font-size="11">仓库存储</text>
  <text x="290" y="126" text-anchor="middle" fill="#cdd6f4" font-size="11">触发 Actions</text>

  <!-- Arrow 2 -->
  <line x1="360" y1="100" x2="410" y2="100" stroke="#a6e3a1" stroke-width="2" marker-end="url(#arr)"/>
  <text x="385" y="92" text-anchor="middle" fill="#a6e3a1" font-size="10">build</text>

  <!-- Box: Pages -->
  <rect x="410" y="60" width="155" height="80" rx="8" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="487" y="88" text-anchor="middle" fill="#f38ba8" font-size="12" font-weight="bold">GitHub Pages</text>
  <text x="487" y="108" text-anchor="middle" fill="#cdd6f4" font-size="11">Hugo 构建</text>
  <text x="487" y="126" text-anchor="middle" fill="#cdd6f4" font-size="11">自动上线</text>

  <!-- File structure -->
  <rect x="30" y="170" width="540" height="130" rx="8" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="50" y="194" fill="#6c7086" font-size="11">目录结构</text>
  <text x="50" y="216" fill="#cdd6f4" font-size="12">content/posts/my-post/</text>
  <text x="50" y="236" fill="#a6e3a1" font-size="12">  ├── index.md        ← Typora 打开写作</text>
  <text x="50" y="256" fill="#89b4fa" font-size="12">  └── images/</text>
  <text x="50" y="276" fill="#89b4fa" font-size="12">       └── screenshot.png  ← 粘贴图片自动存这里</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a6e3a1"/>
    </marker>
  </defs>
</svg>
