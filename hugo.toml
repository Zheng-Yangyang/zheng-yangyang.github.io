baseURL = "https://Zheng-Yangyang.github.io/"
languageCode = "zh-cn"
title = "Yangyang's Blog"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  title = "Yangyang's Blog"
  description = "记录技术笔记与思考"
  author = "Zheng Yangyang"
  defaultTheme = "auto"         # auto / light / dark
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  [params.homeInfoParams]
    Title = "Hi, I'm Yangyang"
    Content = "这里记录我的技术笔记、学习心得和一些想法。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Zheng-Yangyang"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20

  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 30

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]
